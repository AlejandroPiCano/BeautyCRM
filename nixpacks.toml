[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm ci --include=optional || (rm -rf node_modules package-lock.json && npm install --include=optional)"
]

[phases.test]
cmds = ["npm run test:ci"]
dependsOn = ["install"]

[phases.build]
cmds = ["npm run build"]
dependsOn = ["test"]

[start]
cmd = "npm run start"
